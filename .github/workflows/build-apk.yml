name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - name: Create clean Android project
        run: |
          rm -rf /tmp/fc24_build_app
          flutter create --platforms=android --org com.fc24coachai fc24_build_app
          rm -rf /tmp/fc24_build_app
          mv fc24_build_app /tmp/fc24_build_app
      - name: Copy source
        run: |
          rm -rf /tmp/fc24_build_app/lib
          cp -R lib /tmp/fc24_build_app/lib
          cp pubspec.yaml /tmp/fc24_build_app/pubspec.yaml
      - name: Pub get
        working-directory: /tmp/fc24_build_app
        run: flutter pub get
      - name: Build release APK
        working-directory: /tmp/fc24_build_app
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fc24-coach-ai-safe-start-apk
          path: /tmp/fc24_build_app/build/app/outputs/flutter-apk/app-release.apk
