name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - name: Create clean Flutter Android project
        run: |
          rm -rf /tmp/fc24_build_app
          flutter create --platforms=android --org com.fc24coachai fc24_build_app
          rm -rf /tmp/fc24_build_app
          mv fc24_build_app /tmp/fc24_build_app
      - name: Enable Android internet permission
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("/tmp/fc24_build_app/android/app/src/main/AndroidManifest.xml")
          txt = manifest.read_text()
          if "android.permission.INTERNET" not in txt:
              txt = txt.replace("<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">", "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <uses-permission android:name=\"android.permission.INTERNET\" />")
              manifest.write_text(txt)
          PY
      - name: Copy app source
        run: |
          rm -rf /tmp/fc24_build_app/lib
          cp -R lib /tmp/fc24_build_app/lib
          if [ -d "assets" ]; then cp -R assets /tmp/fc24_build_app/assets; fi
          cp pubspec.yaml /tmp/fc24_build_app/pubspec.yaml
      - name: Flutter pub get
        working-directory: /tmp/fc24_build_app
        run: flutter pub get
      - name: Build APK release
        working-directory: /tmp/fc24_build_app
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fc24-coach-ai-pro-v5-apk
          path: /tmp/fc24_build_app/build/app/outputs/flutter-apk/app-release.apk
